version: '3.8'

services:
  backend:
    build:
      context: ./server/beer_backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8002
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      - frontend

  frontend:
    build:
      context: ./client/nano-beer
      dockerfile: Dockerfile
    ports:
      - "5175:5175"
    environment:
      - VITE_API_BASE=http://localhost:8002
    volumes:
      - ./client/nano-beer/src:/app/src

volumes:
  models:
  data:
